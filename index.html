<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Web Editor</title>
    
    <!-- CSS Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        .ace_editor { font-family: 'JetBrains Mono', monospace !important; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-900 text-gray-300 h-screen w-screen overflow-hidden">

    <div 
        x-data="editorApp()" 
        x-cloak
        @mousemove.window="handleDrag" 
        @mouseup.window="stopDrag"
        class="flex flex-col h-full w-full"
    >

        <!-- ========================================== -->
        <!-- VIEW 1: AUTHENTICATION (REGISTER / LOGIN)  -->
        <!-- ========================================== -->
        <div x-show="view === 'auth'" x-transition class="flex-1 flex items-center justify-center bg-gray-900 p-4">
            <div class="bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700 w-full max-w-md">
                
                <div class="mb-6 text-center">
                    <h1 class="text-3xl font-bold text-white tracking-wide">
                        <i class="ri-code-s-slash-line text-blue-500 mr-1"></i>Web<span class="text-blue-500">Editor</span>
                    </h1>
                </div>

                <!-- Tabs -->
                <div class="flex border-b border-gray-700 mb-6">
                    <button @click="authMode = 'register'" 
                            class="flex-1 py-2 font-medium text-sm transition-colors"
                            :class="authMode === 'register' ? 'text-blue-500 border-b-2 border-blue-500' : 'text-gray-400 hover:text-gray-200'">
                        New Student
                    </button>
                    <button @click="authMode = 'login'" 
                            class="flex-1 py-2 font-medium text-sm transition-colors"
                            :class="authMode === 'login' ? 'text-blue-500 border-b-2 border-blue-500' : 'text-gray-400 hover:text-gray-200'">
                        Continuing Work
                    </button>
                </div>

                <!-- REGISTER FORM -->
                <form x-show="authMode === 'register'" @submit.prevent="register" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Full Name</label>
                        <input x-model="student.name" type="text" required placeholder="e.g. John Doe" 
                            class="w-full bg-gray-900 border border-gray-600 text-white rounded px-4 py-2 focus:outline-none focus:border-blue-500 focus:ring-1">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Class / Group</label>
                        <input x-model="student.class" type="text" required placeholder="e.g. 10A" 
                            class="w-full bg-gray-900 border border-gray-600 text-white rounded px-4 py-2 focus:outline-none focus:border-blue-500 focus:ring-1">
                    </div>
                    <button type="submit" :disabled="isProcessing"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2.5 rounded transition-colors shadow-lg mt-2 disabled:opacity-50">
                        <span x-show="!isProcessing">Register & Start</span>
                        <span x-show="isProcessing">Connecting...</span>
                    </button>
                </form>

                <!-- LOGIN FORM -->
                <form x-show="authMode === 'login'" @submit.prevent="login" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Your Secret ID (Password)</label>
                        <input x-model="loginId" type="text" required placeholder="Paste your ID here..." 
                            class="w-full bg-gray-900 border border-gray-600 text-white rounded px-4 py-2 focus:outline-none focus:border-blue-500 focus:ring-1 font-mono text-center tracking-widest">
                    </div>
                    <button type="submit" :disabled="isProcessing"
                        class="w-full bg-green-600 hover:bg-green-500 text-white font-medium py-2.5 rounded transition-colors shadow-lg mt-2 disabled:opacity-50">
                        <span x-show="!isProcessing">Login</span>
                        <span x-show="isProcessing">Loading Work...</span>
                    </button>
                </form>

            </div>
        </div>

        <!-- ========================================== -->
        <!-- VIEW 2: SHOW SECRET ID (AFTER REGISTER)    -->
        <!-- ========================================== -->
        <div x-show="view === 'show_id'" x-transition class="flex-1 flex items-center justify-center bg-gray-900 p-4">
            <div class="bg-gray-800 p-8 rounded-xl shadow-2xl border border-blue-500/50 w-full max-w-md text-center">
                <div class="w-16 h-16 bg-blue-500/20 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="ri-key-2-fill text-3xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-2">Registration Successful!</h2>
                <p class="text-gray-400 mb-6 text-sm">Please save this ID. It is your password to continue your work from home or another computer.</p>
                
                <div class="bg-gray-900 p-4 rounded-lg border border-gray-700 flex items-center justify-between mb-8 group hover:border-blue-500 transition-colors cursor-pointer" @click="copyId">
                    <span x-text="pbRecordId" class="font-mono text-xl text-white tracking-wider select-all"></span>
                    <i class="ri-clipboard-line text-gray-400 group-hover:text-blue-500"></i>
                </div>

                <button @click="continueToEditor" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 rounded transition-colors shadow-lg">
                    I have saved my ID, let's code!
                </button>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- VIEW 3: EDITOR WORKSPACE                   -->
        <!-- ========================================== -->
        <div x-show="view === 'editor'" class="flex flex-col h-full w-full">
            
            <!-- TOOLBAR -->
            <header class="h-14 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-4 shrink-0">
                <!-- Left: Title & Info -->
                <div class="flex items-center gap-4">
                    <div class="font-bold text-white tracking-wide flex items-center">
                        <i class="ri-code-s-slash-line text-blue-500 mr-1"></i>Web<span class="text-blue-500">Editor</span>
                    </div>
                    <div class="h-4 w-px bg-gray-600"></div>
                    <div class="text-xs text-gray-400 flex flex-col justify-center">
                        <div>
                            <span x-text="student.name" class="text-white font-medium"></span> 
                            (<span x-text="student.class" class="text-blue-400"></span>)
                        </div>
                        <div class="font-mono text-[10px] opacity-50 cursor-pointer hover:opacity-100 transition-opacity" @click="copyId" title="Click to copy ID">
                            ID: <span x-text="pbRecordId"></span>
                        </div>
                    </div>
                    <button @click="logout" title="Log Out" class="text-gray-500 hover:text-red-400 text-sm transition-colors ml-2 bg-gray-900/50 p-1.5 rounded">
                        <i class="ri-logout-box-r-line"></i> Exit
                    </button>
                    
                    <div class="h-4 w-px bg-gray-600 hidden md:block"></div>
                    <div class="hidden md:flex items-center gap-2 text-xs font-mono bg-gray-900 px-3 py-1 rounded border border-gray-700">
                        <span class="w-2 h-2 rounded-full" 
                              :class="{
                                  'bg-green-500': statusText === 'Saved' || statusText === 'Deployed',
                                  'bg-yellow-500': isProcessing,
                                  'bg-gray-500': statusText === 'Ready',
                                  'bg-red-500': statusText === 'Error' || statusText === 'Offline Mode'
                              }"></span>
                        <span x-text="statusText"></span>
                    </div>
                </div>

                <!-- Right: Actions -->
                <div class="flex items-center gap-3">
                    <button @click="togglePreview" class="p-2 hover:text-white transition-colors" :class="showPreview ? 'text-blue-400' : 'text-gray-400'">
                        <i class="ri-layout-column-line text-lg"></i>
                    </button>
                    <div class="h-4 w-px bg-gray-600"></div>
                    
                    <button @click="submitToPocketbase('draft')" :disabled="isProcessing" class="px-4 py-1.5 text-sm bg-gray-700 hover:bg-gray-600 text-white rounded disabled:opacity-50 transition-colors">
                        Save Draft
                    </button>
                    <button @click="submitToPocketbase('deploy')" :disabled="isProcessing" class="px-4 py-1.5 text-sm bg-blue-600 hover:bg-blue-500 text-white rounded disabled:opacity-50 shadow-lg shadow-blue-900/20 transition-colors flex items-center gap-2">
                        <i class="ri-upload-cloud-2-line"></i> Submit Final
                    </button>
                </div>
            </header>

            <!-- WORKSPACE -->
            <main x-ref="workspaceContainer" class="flex-1 flex overflow-hidden relative">
                <div class="relative flex flex-col bg-gray-900" :style="`width: ${showPreview ? leftWidth : 100}%`">
                    <div x-ref="mainEditor" class="absolute inset-0 w-full h-full"></div>
                </div>

                <div x-show="showPreview" @mousedown="startDrag($event)"
                    class="w-1 bg-gray-800 hover:bg-blue-500 cursor-col-resize z-50 flex items-center justify-center transition-colors group">
                </div>

                <div x-show="showPreview" class="flex-1 relative bg-white">
                    <div x-show="dragType" class="absolute inset-0 z-50 bg-transparent cursor-col-resize"></div>
                    <iframe x-ref="previewFrame" class="w-full h-full border-0"></iframe>
                </div>
            </main>
        </div>

        <!-- ========================================== -->
        <!-- TOAST NOTIFICATIONS                        -->
        <!-- ========================================== -->
        <div class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
            <template x-for="note in $store.notifications.items" :key="note.id">
                <div x-data="{ show: true }" x-show="show" x-transition.opacity.duration.300ms
                    class="bg-gray-800 text-white px-4 py-3 rounded shadow-xl border-l-4 pointer-events-auto text-sm"
                    :class="{
                        'border-green-500': note.type === 'success',
                        'border-red-500': note.type === 'error',
                        'border-yellow-500': note.type === 'warning'
                    }">
                    <span x-text="note.message"></span>
                </div>
            </template>
        </div>

    </div>

    <!-- ========================================== -->
    <!-- APPLICATION LOGIC                          -->
    <!-- ========================================== -->
    <script type="module">
        import Alpine from 'https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/module.esm.js';
        import ace from 'https://esm.sh/ace-builds@1.32.7/src-min-noconflict/ace';

        const ACE_CDN = "https://cdn.jsdelivr.net/npm/ace-builds@1.32.7/src-min-noconflict/";
        ace.config.set('basePath', ACE_CDN);
        ace.config.set('modePath', ACE_CDN);
        ace.config.set('themePath', ACE_CDN);
        ace.config.set('workerPath', ACE_CDN);

        // --- POCKETBASE URL ---
        // Change this to your live server URL when ready. 
        const POCKETBASE_URL = "https://pb-irc.artesparadox.net/api/collections/kelas_koding/records";

        document.addEventListener('alpine:init', () => {
            
            Alpine.store('notifications', {
                items: [],
                add(note) {
                    const id = Date.now();
                    this.items.push({ id, ...note });
                    setTimeout(() => { this.items = this.items.filter(n => n.id !== id); }, 3000);
                }
            });

            Alpine.data('editorApp', () => ({
                view: 'auth', // 'auth' | 'show_id' | 'editor'
                authMode: 'register', // 'register' | 'login'
                isProcessing: false,
                statusText: 'Ready',
                
                // User & Server State
                student: { name: '', class: '' },
                loginId: '', 
                pbRecordId: null, 
                loadedCode: null, // Holds code fetched from server

                // Layout State
                leftWidth: 50,
                showPreview: true,
                dragType: null,
                editor: null,

                defaultHTML: `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS Frameworks</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 12px 0; overflow: hidden; }
    .card img { width: 48px; height: 48px; object-fit: contain; float: right; }
    .card h2 { margin: 0 0 6px 0; }
    .card p { margin: 0 0 10px 0; color: #555; font-size: 14px; }
    .badge { display: inline-block; background: #eee; border-radius: 4px; padding: 2px 8px; font-size: 12px; margin-right: 4px; }
  </style>
</head>
<body>
  <h1>JS Frameworks</h1>
  <div id="list">Loading...</div>

  <script>
    fetch("https://pb-irc.artesparadox.net/api/collections/js_framework/records")
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var list = document.getElementById("list");
        list.innerHTML = "";
        data.items.forEach(function(fw) {
          list.innerHTML += "<div class='card'>" +
            "<img src='" + fw.logo + "' alt='" + fw.name + "'>" +
            "<h2>" + fw.name + "</h2>" +
            "<p>" + fw.description + "</p>" +
            "<span class='badge'>Age: " + fw.age + "</span>" +
            "<span class='badge'>Complexity: " + fw.complexity + "</span>" +
            "</div>";
        });
      });
  <\/script>
</body>
</html>`,

                // -----------------------------------------
                // STARTUP & AUTO-LOGIN
                // -----------------------------------------
                init() {
                    const savedRecordId = localStorage.getItem('pb_record_id');
                    if (savedRecordId) {
                        this.loginId = savedRecordId;
                        this.login(true); // Attempt auto-login in background
                    }
                },

                // -----------------------------------------
                // AUTH: REGISTER & LOGIN
                // -----------------------------------------
                async register() {
                    if (!this.student.name || !this.student.class) return;
                    this.isProcessing = true;

                    const payload = {
                        name: this.student.name,
                        class: this.student.class,
                        html_draft: this.defaultHTML
                    };

                    try {
                        const res = await fetch(POCKETBASE_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!res.ok) throw new Error("Failed to connect to server");
                        
                        const data = await res.json();
                        this.pbRecordId = data.id;
                        this.finishAuthFlow(true); // show ID screen
                        
                    } catch (error) {
                        console.warn("PocketBase not found. Simulating registration for testing.");
                        // FAKE LOCAL OFFLINE MODE (So you can test without PB running)
                        this.pbRecordId = 'offline_' + Math.random().toString(36).substr(2, 9);
                        localStorage.setItem('offline_mock_data_' + this.pbRecordId, JSON.stringify(payload));
                        this.finishAuthFlow(true);
                    } finally {
                        this.isProcessing = false;
                    }
                },

                async login(isAutoLogin = false) {
                    if (!this.loginId) return;
                    this.isProcessing = true;

                    try {
                        const res = await fetch(`${POCKETBASE_URL}/${this.loginId}`);
                        if (!res.ok) throw new Error("ID not found on server");
                        
                        const data = await res.json();
                        this.student.name = data.name;
                        this.student.class = data.class;
                        this.pbRecordId = data.id;
                        this.loadedCode = data.html_draft;
                        
                        this.finishAuthFlow(false);

                    } catch (error) {
                        // OFFLINE FALLBACK LOGIC
                        const mockDataStr = localStorage.getItem('offline_mock_data_' + this.loginId);
                        if (mockDataStr) {
                            const mockData = JSON.parse(mockDataStr);
                            this.student.name = mockData.name;
                            this.student.class = mockData.class;
                            this.pbRecordId = this.loginId;
                            this.loadedCode = mockData.html_draft;
                            this.statusText = "Offline Mode";
                            this.finishAuthFlow(false);
                        } else {
                            if (!isAutoLogin) {
                                this.$store.notifications.add({ type: 'error', message: 'Invalid ID or Server Offline' });
                            }
                        }
                    } finally {
                        this.isProcessing = false;
                    }
                },

                finishAuthFlow(isNew) {
                    localStorage.setItem('pb_record_id', this.pbRecordId);
                    if (isNew) {
                        this.view = 'show_id';
                    } else {
                        this.continueToEditor();
                    }
                },

                continueToEditor() {
                    this.view = 'editor';
                    this.initEditorEnv(this.loadedCode || this.defaultHTML);
                },

                logout() {
                    if(confirm("Log out? Make sure you have saved your ID!")) {
                        localStorage.removeItem('pb_record_id');
                        this.student = { name: '', class: '' };
                        this.pbRecordId = null;
                        this.loginId = '';
                        this.view = 'auth';
                        if (this.editor) this.editor.destroy();
                    }
                },

                async copyId() {
                    await navigator.clipboard.writeText(this.pbRecordId);
                    this.$store.notifications.add({ type: 'success', message: 'ID Copied to clipboard!' });
                },

                // -----------------------------------------
                // EDITOR LOGIC
                // -----------------------------------------
                initEditorEnv(initialContent) {
                    this.$nextTick(() => {
                        this.editor = ace.edit(this.$refs.mainEditor);
                        this.editor.setTheme("ace/theme/tomorrow_night_eighties");
                        this.editor.session.setMode("ace/mode/html");
                        this.editor.setShowPrintMargin(false);
                        this.editor.setOptions({
                            fontSize: "14px",
                            fontFamily: "'JetBrains Mono', monospace",
                            useSoftTabs: true,
                            tabSize: 2,
                            showLineNumbers: true,
                        });
                        
                        this.editor.setValue(initialContent, -1);
                        
                        this.editor.session.on('change', () => {
                            clearTimeout(this.previewTimeout);
                            this.previewTimeout = setTimeout(() => this.updatePreview(), 500);
                            
                            if (this.statusText !== 'Offline Mode') {
                                this.statusText = 'Unsaved changes';
                            }
                        });

                        new ResizeObserver(() => this.editor.resize())
                            .observe(this.$refs.workspaceContainer);

                        this.updatePreview();
                    });
                },

                updatePreview() {
                    if (this.$refs.previewFrame && this.editor) {
                        this.$refs.previewFrame.srcdoc = this.editor.getValue();
                    }
                },

                // -----------------------------------------
                // POCKETBASE SAVING
                // -----------------------------------------
                async submitToPocketbase(actionType = 'draft') {
                    if (!this.pbRecordId) return;

                    this.isProcessing = true;
                    this.statusText = actionType === 'deploy' ? 'Submitting...' : 'Saving...';
                    
                    const currentCode = this.editor.getValue();
                    const payload = { html_draft: currentCode };
                    if (actionType === 'deploy') payload.html = currentCode;

                    try {
                        const res = await fetch(`${POCKETBASE_URL}/${this.pbRecordId}`, {
                            method: 'PATCH', // Always update the existing record
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!res.ok) throw new Error("Failed to save");

                        this.statusText = actionType === 'deploy' ? 'Deployed' : 'Saved';
                        this.$store.notifications.add({ 
                            type: 'success', 
                            message: actionType === 'deploy' ? 'Final code submitted!' : 'Draft saved to server.' 
                        });

                    } catch (error) {
                        // OFFLINE FALLBACK
                        const mockStr = localStorage.getItem('offline_mock_data_' + this.pbRecordId);
                        if (mockStr) {
                            const mockData = JSON.parse(mockStr);
                            mockData.html_draft = currentCode;
                            localStorage.setItem('offline_mock_data_' + this.pbRecordId, JSON.stringify(mockData));
                        }
                        
                        this.statusText = 'Offline Mode';
                        this.$store.notifications.add({ 
                            type: 'warning', 
                            message: 'Saved locally. Server is offline.' 
                        });
                    } finally {
                        this.isProcessing = false;
                    }
                },

                // -----------------------------------------
                // LAYOUT & DRAG
                // -----------------------------------------
                togglePreview() {
                    this.showPreview = !this.showPreview;
                    if (this.showPreview && this.leftWidth > 90) this.leftWidth = 50;
                },

                startDrag(e) {
                    this.dragType = 'horizontal';
                    document.body.style.cursor = 'col-resize';
                    e.preventDefault(); 
                },

                stopDrag() {
                    this.dragType = null;
                    document.body.style.cursor = 'default';
                },

                handleDrag(e) {
                    if (this.dragType !== 'horizontal') return;
                    const containerRect = this.$refs.workspaceContainer.getBoundingClientRect();
                    let newWidth = ((e.clientX - containerRect.left) / containerRect.width) * 100;
                    if (newWidth < 10) newWidth = 10;
                    if (newWidth > 90) newWidth = 90;
                    this.leftWidth = newWidth;
                    if(this.editor) this.editor.resize();
                }
            }));
        });

        Alpine.start();
    </script>
</body>
</html>
